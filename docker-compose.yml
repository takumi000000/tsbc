version: '3.8'
services:
  feedback:
    build: .
    container_name: feedback  # コンテナ名を "feedback" に統一
    ports:
      - "3000:3000"           # ホスト:コンテナ
    volumes:
      - .:/app                # ローカルのソースをコンテナにマウント（開発用）
    # SQLite3はファイルベースなので、サービス分割はしない
    # networks:
    #   - feedbacknet

# ネットワーク設定が必要な場合は以下のように定義
# networks:
#   feedbacknet:
#     driver: bridge
